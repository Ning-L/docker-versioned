name: Build & Push UMR

on:
  workflow_run:
    workflows:
      - "Build & Push Core"
    branches: main
    types: completed
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: true

jobs:
  generate_matrix:
    runs-on: ubuntu-latest
    if: ${{ github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success' }}
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
    steps:
      - uses: actions/checkout@v4
      - id: set-matrix
        run: |
          CURR=$(cat 05-matrix/github_action_matrix_all_umr.json)
          PREV=$(git show HEAD~1:05-matrix/github_action_matrix_all_umr.json 2>/dev/null || echo '{"r_version":[]}')
          NEW=$(jq -n \
            --argjson curr "$CURR" \
            --argjson prev "$PREV" \
            '$curr | .r_version = [.r_version[] | select(. as $v | ($prev.r_version | index($v)) == null)]')
          if [ "$(echo "$NEW" | jq '.r_version | length')" -gt 0 ]; then
            CONTENT=$(echo "$NEW" | jq -r 'tostring')
          else
            CONTENT=$(echo "$CURR" | jq -r 'tostring')
          fi
          echo "matrix=${CONTENT}" >>$GITHUB_OUTPUT
  build:
    runs-on: ubuntu-latest
    needs: generate_matrix
    strategy:
      fail-fast: false
      matrix: ${{fromJson(needs.generate_matrix.outputs.matrix)}}
    steps:
      - uses: actions/checkout@v4
      - uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - uses: docker/login-action@v2
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v2
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2
      - name: Build and push Docker images
        run: |
          BAKE_JSON=04-bakefiles/${{ matrix.r_version }}.docker-bake.json
          for itarget in $(jq '.group[].${{ matrix.group }}[].targets[]' -r ${BAKE_JSON}); do
            docker buildx bake \
              --file ${BAKE_JSON} \
              --set=*.labels.org.opencontainers.image.revision=${GITHUB_SHA} \
              --push ${itarget}; 
          done
  generate_matrix_server:
    runs-on: ubuntu-latest
    needs: build
    outputs:
      matrix: ${{ steps.set-matrix-server.outputs.matrix }}
    steps:
      - uses: actions/checkout@v4
      - id: set-matrix-server
        run: |
          CONTENT=$(jq -r 'tostring' 05-matrix/github_action_matrix_all_server.json)
          echo "matrix=${CONTENT}" >>$GITHUB_OUTPUT
  build-server:
    runs-on: ubuntu-latest
    needs: generate_matrix_server
    strategy:
      fail-fast: false
      matrix: ${{fromJson(needs.generate_matrix_server.outputs.matrix)}}
    steps:
      - uses: actions/checkout@v4
      - uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v2
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2
      - name: Build and push Docker images
        run: |
          BAKE_JSON=04-bakefiles/${{ matrix.r_version }}.docker-bake.json
          for itarget in $(jq '.group[].${{ matrix.group }}[].targets[]' -r ${BAKE_JSON}); do 
            docker buildx bake \
              --file ${BAKE_JSON} \
              --set=*.labels.org.opencontainers.image.revision=${GITHUB_SHA} \
              --push ${itarget};
          done
  check-server:
    runs-on: ubuntu-latest
    if: ${{ false }}
    needs:
      - generate_matrix_server
      - build-server
    strategy:
      fail-fast: false
      matrix:
        image-ref: [inforbio, rstudio]
        tags: ${{fromJson(needs.generate_matrix_server.outputs.matrix)}}
    steps:
      - uses: actions/checkout@v4
      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: 'docker.io/lijiaoning/${{ matrix.image-ref }}:${{ matrix.tags.r_version }}'
          output: '06-trivy/trivy-${{ matrix.image-ref }}-${{ matrix.tags.r_version }}.txt'
          format: 'table'
          vuln-type: 'os,library'
          severity: 'CRITICAL,HIGH'
  pr-server:
    runs-on: ubuntu-latest
    needs: check-server
    strategy:
      fail-fast: false
    steps:
      - uses: actions/checkout@v4
      - name: Create Pull Request
        id: cpr
        uses: peter-evans/create-pull-request@v4
        with:
          commit-message: Automatic Trivy checks
          signoff: false
          branch: auto-detected-updates
          delete-branch: true
          title: "Automatic Trivy checks"
          committer: ${{ github.actor }} <${{ github.actor }}@users.noreply.github.com>
      - name: Check outputs
        run: |
          echo "Pull Request Number - ${{ steps.cpr.outputs.pull-request-number }}"
          echo "Pull Request URL - ${{ steps.cpr.outputs.pull-request-url }}"
